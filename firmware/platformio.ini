; PlatformIO Project Configuration
; Spatial Bracelet - WiFi HTTP POST firmware with Voice Activation
; Target: XIAO ESP32S3 Sense

[env:seeed_xiao_esp32s3]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino

; Enable PSRAM for camera and ML buffers
build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DEI_CLASSIFIER_ALLOCATION_STATIC
    -DEIDSP_USE_CMSIS_DSP=0
    -DEIDSP_LOAD_CMSIS_DSP_SOURCES=0
    -DEI_CLASSIFIER_TFLITE_ENABLE_ESP_NN=0
    ; TCP/LWIP optimization for faster HTTP transfers
    -DCONFIG_LWIP_TCP_WND_DEFAULT=32768
    -DCONFIG_LWIP_TCP_SND_BUF_DEFAULT=32768
    -DCONFIG_ESP_WIFI_DYNAMIC_RX_BUFFER_NUM=32
    -DCONFIG_ESP_WIFI_DYNAMIC_TX_BUFFER_NUM=32

; Required libraries
lib_deps =
    adafruit/Adafruit NeoPixel@^1.12.0

; Edge Impulse library is in lib/ folder (auto-detected)

; Serial monitor
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; Upload settings
upload_speed = 921600

; Increase build memory for ML model
board_build.partitions = huge_app.csv
